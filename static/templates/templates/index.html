<!DOCTYPE html>
<html>
<head>
    <title>AI Video Dubber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">AI Video Dubbing Tool</h2>
    <div class="card p-4 shadow">
        <div class="mb-3">
            <label class="form-label">Gemini API Key</label>
            <input type="password" class="form-control" id="apiKey" placeholder="Enter your Gemini API Key">
        </div>
        <div class="mb-3">
            <label class="form-label">Select Video File</label>
            <input type="file" class="form-control" id="videoFile" accept="video/*">
        </div>
        <div class="mb-3">
            <label class="form-label">Target Language</label>
            <select class="form-control" id="targetLang">
                <option value="Myanmar">Myanmar</option>
                <option value="English">English</option>
            </select>
        </div>
        <button class="btn btn-primary w-100" onclick="processVideo()">Process Video</button>
        <div id="status" class="mt-3 text-center fw-bold"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
