<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Dubber | Dharma Shade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .container { max-width: 600px; }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-control, .form-select {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            background: #334155;
            color: white;
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #status {
            font-size: 0.9rem;
            border-radius: 0.75rem;
        }
        .loading-spinner {
            display: none;
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <i class="fas fa-magic header-icon mb-3"></i>
            <h2 class="fw-bold">AI Video Dubber</h2>
            <p class="text-secondary">Powered by Dharma Shade Media</p>
        </div>

        <div class="card p-4 p-md-5">
            <div class="mb-4">
                <label class="form-label text-info"><i class="fas fa-key me-2"></i>Gemini API Key</label>
                <input type="password" class="form-control" id="apiKey" placeholder="Enter Key here...">
            </div>

            <div class="mb-4">
                <label class="form-label text-info"><i class="fas fa-video me-2"></i>Select Video</label>
                <input type="file" class="form-control" id="videoFile" accept="video/*">
            </div>

            <div class="mb-4">
                <label class="form-label text-info"><i class="fas fa-language me-2"></i>Target Language</label>
                <select class="form-select" id="targetLang">
                    <option value="Myanmar" selected>Myanmar (ဗမာစာ)</option>
                    <option value="English">English</option>
                    <option value="Thai">Thai</option>
                </select>
            </div>

            <button class="btn btn-primary w-100 d-flex align-items-center justify-content-center" onclick="processVideo()">
                <div class="loading-spinner me-2" id="spinner"></div>
                <span><i class="fas fa-rocket me-2"></i>Process Video</span>
            </button>

            <div id="status" class="mt-4 p-3 text-center"></div>
        </div>

        <div class="text-center mt-4 text-secondary small">
            &copy; 2026 Dharma Shade Production. All Rights Reserved.
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Button အလုပ်လုပ်တဲ့အခါ Spinner လေးပြပေးဖို့ JavaScript ထပ်ဖြည့်တာပါ
        const originalProcess = window.processVideo;
        window.processVideo = async function() {
            document.getElementById('spinner').style.display = 'inline-block';
            await originalProcess();
            document.getElementById('spinner').style.display = 'none';
        }
    </script>
</body>
</html>
