<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharma Shade Production - AI Dubber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pyidaungsu', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            border-radius: 20px;
        }
        .gradient-btn {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: all 0.3s ease;
        }
        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="glass-card w-full max-w-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                Dharma Shade Production
            </h1>
            <p class="text-gray-400 italic">AI Video Dubbing Studio</p>
        </div>

        <form id="uploadForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Gemini API Key</label>
                <input type="password" name="api_key" required 
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white"
                    placeholder="Enter your API Key here...">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Choose Video (Max 10MB)</label>
                <input type="file" name="file" accept="video/*" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Target Language</label>
                <select name="target_lang" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                    <option value="myanmar">Myanmar (Burmese)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full gradient-btn text-white font-bold py-4 rounded-xl text-lg mt-4">
                PROCESS VIDEO
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Processing... Please wait';
            statusDiv.innerHTML = '<p class="text-yellow-400 font-bold mb-4">AI is translating and dubbing your video...</p>';

            const formData = new FormData(form);

            try {
                const response = await fetch('/dub-video', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    statusDiv.innerHTML = `
                        <p class="text-green-400 font-bold mb-6">${result.message}</p>
                        <div class="flex gap-4 justify-center">
                            <a href="${result.mp3_url}" download class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition">DOWNLOAD MP3</a>
                            <a href="${result.mp4_url}" download class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-bold transition">DOWNLOAD MP4</a>
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = `<p class="text-red-400 font-bold">Error: ${result.message}</p>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<p class="text-red-400 font-bold">System Error: ${error.message}</p>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'PROCESS VIDEO';
            }
        });
    </script>
</body>
</html>
