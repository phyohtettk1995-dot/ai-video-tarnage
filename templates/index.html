const result = await response.json();
const statusDiv = document.getElementById('status');

if (result.status === 'success') {
    statusDiv.innerHTML = `
        <p class="text-green-400 font-bold mb-4">${result.message}</p>
        <div class="flex gap-4 justify-center">
            <a href="${result.mp3_url}" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold">DOWNLOAD MP3</a>
            <a href="${result.mp4_url}" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-bold">DOWNLOAD MP4</a>
        </div>
    `;
} else {
    statusDiv.innerHTML = `<p class="text-red-400">${result.message}</p>`;
}
